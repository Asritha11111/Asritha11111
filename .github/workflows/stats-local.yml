name: Generate Local Stats Images

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate Stats SVG
        run: |
          curl -o github-stats.svg "https://github-readme-stats.vercel.app/api?username=Asritha11111&show_icons=true&theme=tokyonight&hide_border=true"
          curl -o github-top-langs.svg "https://github-readme-stats.vercel.app/api/top-langs/?username=Asritha11111&layout=compact&theme=tokyonight"

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github-stats.svg github-top-langs.svg
          git diff --staged --quiet || git commit -m "chore: update stats images [skip ci]"
          git push
